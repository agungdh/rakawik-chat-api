name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-jar:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JAR
        run: ./gradlew bootJar --no-daemon

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: build/libs/*.jar

  docker:
    needs: build-jar
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.build-jar.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: build/libs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          tags: |
            agungdh/rakawik-chat-api:${{ env.VERSION }}-${{ matrix.arch }}
            ghcr.io/agungdh/rakawik-chat-api:${{ env.VERSION }}-${{ matrix.arch }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  manifest:
    needs: [build-jar, docker]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build-jar.outputs.version }}

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          DOCKER_REPO="agungdh/rakawik-chat-api"
          GHCR_REPO="ghcr.io/agungdh/rakawik-chat-api"

          for repo in $DOCKER_REPO $GHCR_REPO; do
            docker manifest create $repo:$VERSION \
              $repo:$VERSION-amd64 \
              $repo:$VERSION-arm64

            docker manifest create $repo:latest \
              $repo:$VERSION-amd64 \
              $repo:$VERSION-arm64

            docker manifest push $repo:$VERSION
            docker manifest push $repo:latest
          done

  release:
    needs: build-jar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: build/libs

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
