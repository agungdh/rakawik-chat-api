spring:
  application:
    name: rakawikchat
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/chat
    username: admin
    password: admin
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  mongodb:
    host: 127.0.0.1
    port: 27017
    database: chat
    username: admin
    password: admin
    authentication-database: admin

minio:
  endpoint: http://127.0.0.1:9000
  access-key: minioadmin
  secret-key: minioadmin
