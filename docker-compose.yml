  #     SPRING_MONGODB_AUTHENTICATION_DATABASE: admin
  #     SPRING_DATA_REDIS_HOST: redis
  #     SPRING_DATA_REDIS_PORT: 6379

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  minio_data:
